name: DietCloud
options:
  bundleIdPrefix: app.dietcloud
  deploymentTarget:
    iOS: "18.0"
  createIntermediateGroups: true
  groupSortPosition: top
  generateEmptyDirectories: true
settings:
  base:
    SWIFT_VERSION: "5.10"
    TARGETED_DEVICE_FAMILY: "1,2"
    IPHONEOS_DEPLOYMENT_TARGET: "18.0"
    ENABLE_USER_SCRIPT_SANDBOXING: true
    CLANG_ENABLE_MODULES: true
packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: 2.31.0
configs:
  Debug: debug
  Release: release
targets:
  DietCloud:
    type: application
    platform: iOS
    sources:
      - path: DietCloud
        excludes:
          - "**/.DS_Store"
    dependencies:
      - package: Supabase
        product: Supabase
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.dietcloud.DietCloud
        PRODUCT_NAME: DietCloud
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_FILE: DietCloud/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: DietCloud/Resources/DietCloud.entitlements
        INFOPLIST_KEY_CFBundleDisplayName: 膳食志
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: true
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_STRICT_CONCURRENCY: complete
        TARGETED_DEVICE_FAMILY: "1,2"
      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
        Release:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: ""
    configFiles:
      Debug: Config/Debug.xcconfig
      Release: Config/Release.xcconfig
    scheme:
      testTargets:
        - DietCloudTests
      gatherCoverageData: false
  DietCloudTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: DietCloudTests
    dependencies:
      - target: DietCloud
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.dietcloud.DietCloudTests
        PRODUCT_NAME: DietCloudTests
        GENERATE_INFOPLIST_FILE: true
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/DietCloud.app/DietCloud"
        BUNDLE_LOADER: "$(TEST_HOST)"
        SWIFT_STRICT_CONCURRENCY: complete
